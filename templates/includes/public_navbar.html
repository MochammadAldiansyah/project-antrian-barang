{% load static %}
<header class="sticky top-0 z-50 border-b-4 border-black bg-white">
  <div class="mx-auto flex h-16 max-w-7xl items-center justify-between gap-4 px-4 sm:px-6 lg:px-8">
    <a href="{% url 'antrian:ambil_antrian' %}" class="text-lg font-black uppercase tracking-tight sm:text-xl">
      Antrian<span class="text-brand-blue">Barang</span>
    </a>
    <nav id="publicNav" class="fixed inset-0 top-16 z-40 hidden flex-col gap-2 border-t-4 border-black bg-white p-4 md:static md:flex md:flex-row md:items-center md:border-0 md:bg-transparent md:p-0">
      <a href="{% url 'antrian:ambil_antrian' %}" class="border-2 px-4 py-2 text-sm font-semibold transition {% if active_page == 'ambil' %}border-black bg-brand-yellow font-bold shadow-brutal-sm{% else %}border-transparent hover:border-black hover:bg-brand-yellow{% endif %}">Ambil Antrian</a>
